{% extends "base.html" %}
{% block title %}Create Purchase Order{% endblock %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4"><i class="bi bi-file-earmark-text"></i> Create Purchase Order</h1>
    <div class="card">
        <div class="card-body">
            <form method="POST" id="poForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Supplier <span class="text-danger">*</span></label>
                        <select class="form-select" name="supplier_id" required>
                            <option value="">Select Supplier</option>
                            {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Expected Delivery Date</label>
                        <input type="date" class="form-control" name="expected_delivery_date">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" name="notes" rows="2"></textarea>
                    </div>
                    <div class="col-12"><hr></div>
                    <div class="col-12"><h5>Products</h5></div>
                    <div id="items-container">
                        <div class="row g-2 mb-2 item-row">
                            <div class="col-md-5">
                                <select class="form-select product-select" name="product_id[]" required>
                                    <option value="">Select Product</option>
                                    {% for product in products %}
                                    <option value="{{ product.id }}" 
                                            data-price="{{ product.unit_price }}"
                                            {% if preselected_product and preselected_product.id == product.id %}selected{% endif %}>
                                        {{ product.title }} - ₱{{ "{:,.2f}".format(product.unit_price) }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-3"><input type="number" class="form-control quantity-input" name="quantity[]" placeholder="Quantity" min="1" required></div>
                            <div class="col-md-3"><input type="number" class="form-control price-input" name="unit_price[]" placeholder="Unit Price" step="0.01" min="0" required></div>
                            <div class="col-md-1"><button type="button" class="btn btn-sm btn-danger" onclick="removeItem(this)"><i class="bi bi-trash"></i></button></div>
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="button" class="btn btn-sm btn-secondary" onclick="addItem()"><i class="bi bi-plus"></i> Add Item</button>
                    </div>
                    <div class="col-12"><hr></div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> Create PO</button>
                        <a href="{{ url_for('purchase_orders.list_pos') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
// Auto-fill price when product is selected
document.addEventListener('DOMContentLoaded', function() {
    attachProductListeners();
});

function attachProductListeners() {
    document.querySelectorAll('.product-select').forEach(select => {
        select.addEventListener('change', function() {
            const row = this.closest('.item-row');
            const selectedOption = this.options[this.selectedIndex];
            const price = selectedOption.dataset.price || 0;
            row.querySelector('.price-input').value = price;
        });
    });
}

function addItem() {
    const container = document.getElementById('items-container');
    const firstRow = container.querySelector('.item-row');
    const newRow = firstRow.cloneNode(true);
    
    // Clear all inputs
    newRow.querySelectorAll('input').forEach(input => input.value = '');
    newRow.querySelector('.product-select').selectedIndex = 0;
    
    container.appendChild(newRow);
    attachProductListeners();
}

function removeItem(btn) {
    if (document.querySelectorAll('.item-row').length > 1) {
        btn.closest('.item-row').remove();
    }
}
</script>
{% endblock %}
